kind = "web"
previewPath = "/"
title = "Routinify Dashboard"
version = "1.0.0"
id = "artifacts/routinify"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22634

[services.development]
run = "pnpm --filter @workspace/routinify run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/routinify", "run", "build" ]
publicDir = "artifacts/routinify/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22634"
BASE_PATH = "/"
